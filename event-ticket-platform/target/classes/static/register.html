<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EventPlatform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">🎟️</div>
                <h1>EventPlatform</h1>
                <p>Create your account</p>
            </div>
            <div id="alert-box" class="alert hidden"></div>
            <form id="register-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="johndoe" required minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone (optional)</label>
                        <input type="tel" id="phone" placeholder="+1 234 567 8900">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                        <span class="toggle-password" onclick="togglePassword('password')">👁</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-icon-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="confirmPassword" placeholder="Repeat password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="register-btn">
                    <span id="register-text">Create Account</span>
                    <span id="register-spinner" class="spinner hidden"></span>
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="/login.html">Sign in</a></p>
            </div>
        </div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const text = document.getElementById('register-text');
            const spinner = document.getElementById('register-spinner');

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                showAlert('Passwords do not match!', 'error');
                return;
            }

            btn.disabled = true;
            text.textContent = 'Creating...';
            spinner.classList.remove('hidden');

            const data = {
                fullName: document.getElementById('fullName').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: password
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('username', result.username);
                    localStorage.setItem('fullName', result.fullName);
                    localStorage.setItem('email', result.email);
                    localStorage.setItem('role', result.role);
                    localStorage.setItem('userId', result.userId);
                    showAlert('Account created! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = '/events.html'; }, 1200);
                } else {
                    showAlert(result.message || 'Registration failed!', 'error');
                }
            } catch (err) {
                showAlert('Connection error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                text.textContent = 'Create Account';
                spinner.classList.add('hidden');
            }
        });

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
