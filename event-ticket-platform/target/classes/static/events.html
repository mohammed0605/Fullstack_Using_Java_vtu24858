<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - EventPlatform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo-icon">🎟️</span>
            <a href="/events.html">EventPlatform</a>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="/events.html" class="active">Events</a>
            <span id="nav-user-links"></span>
        </div>
    </nav>

    <div class="hero-section">
        <div class="hero-content">
            <h1>Discover Amazing Events</h1>
            <p>Find and book tickets for the best events near you</p>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search events by name...">
                <button class="btn btn-primary" onclick="searchEvents()">Search</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="filters-bar">
            <div class="filter-group">
                <label>Filter by Status:</label>
                <select id="status-filter" onchange="filterEvents()">
                    <option value="">All Events</option>
                    <option value="UPCOMING">Upcoming</option>
                    <option value="ONGOING">Ongoing</option>
                    <option value="COMPLETED">Completed</option>
                </select>
            </div>
            <div class="results-count" id="results-count"></div>
        </div>

        <div id="events-loading" class="loading-state">
            <div class="spinner-large"></div>
            <p>Loading events...</p>
        </div>

        <div id="events-grid" class="events-grid hidden"></div>

        <div id="no-events" class="empty-state hidden">
            <div class="empty-icon">🔍</div>
            <h3>No events found</h3>
            <p>Try adjusting your search or filters</p>
        </div>
    </div>

    <!-- Event Detail Modal -->
    <div id="event-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="/js/script.js"></script>
    <script>
        let allEvents = [];

        updateNavLinks();
        loadEvents();

        async function loadEvents() {
            try {
                const response = await fetch('/api/events');
                allEvents = await response.json();
                renderEvents(allEvents);
            } catch (err) {
                document.getElementById('events-loading').innerHTML = '<p class="error-text">Failed to load events.</p>';
            }
        }

        function renderEvents(events) {
            const grid = document.getElementById('events-grid');
            const loading = document.getElementById('events-loading');
            const noEvents = document.getElementById('no-events');
            const count = document.getElementById('results-count');

            loading.classList.add('hidden');
            count.textContent = `${events.length} event${events.length !== 1 ? 's' : ''} found`;

            if (events.length === 0) {
                grid.classList.add('hidden');
                noEvents.classList.remove('hidden');
                return;
            }

            noEvents.classList.add('hidden');
            grid.classList.remove('hidden');
            grid.innerHTML = events.map(event => createEventCard(event)).join('');
        }

        function createEventCard(event) {
            const date = new Date(event.eventDate);
            const dateStr = date.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
            const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            const statusClass = `status-${event.status.toLowerCase()}`;
            const isAvailable = event.availableTickets > 0 && event.status === 'UPCOMING';
            const categoryIcon = getCategoryIcon(event.category);

            return `
                <div class="event-card" onclick="showEventDetail(${event.id})">
                    <div class="event-card-image" style="background: ${getCategoryGradient(event.category)}">
                        <span class="event-category-icon">${categoryIcon}</span>
                        <span class="event-status-badge ${statusClass}">${event.status}</span>
                    </div>
                    <div class="event-card-body">
                        <div class="event-category-tag">${event.category || 'General'}</div>
                        <h3 class="event-title">${event.title}</h3>
                        <div class="event-meta">
                            <span>📅 ${dateStr}</span>
                            <span>⏰ ${timeStr}</span>
                        </div>
                        <div class="event-meta">
                            <span>📍 ${event.venue}</span>
                        </div>
                        <div class="event-footer">
                            <div class="event-price">₹${parseFloat(event.ticketPrice).toFixed(2)}</div>
                            <div class="event-tickets ${isAvailable ? '' : 'sold-out'}">
                                ${isAvailable ? `${event.availableTickets} left` : 'Sold Out'}
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        async function showEventDetail(eventId) {
            const event = allEvents.find(e => e.id === eventId);
            if (!event) return;

            const date = new Date(event.eventDate);
            const dateStr = date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            const isAvailable = event.availableTickets > 0 && event.status === 'UPCOMING';
            const isLoggedIn = !!localStorage.getItem('token');

            document.getElementById('modal-body').innerHTML = `
                <div class="modal-event-header" style="background: ${getCategoryGradient(event.category)}">
                    <span class="modal-category-icon">${getCategoryIcon(event.category)}</span>
                    <span class="event-status-badge status-${event.status.toLowerCase()}">${event.status}</span>
                </div>
                <div class="modal-event-body">
                    <div class="event-category-tag">${event.category || 'General'}</div>
                    <h2>${event.title}</h2>
                    <p class="event-description">${event.description || 'No description available.'}</p>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <span class="detail-icon">📅</span>
                            <div><strong>Date</strong><p>${dateStr}</p></div>
                        </div>
                        <div class="detail-item">
                            <span class="detail-icon">⏰</span>
                            <div><strong>Time</strong><p>${timeStr}</p></div>
                        </div>
                        <div class="detail-item">
                            <span class="detail-icon">🏛️</span>
                            <div><strong>Venue</strong><p>${event.venue}</p></div>
                        </div>
                        <div class="detail-item">
                            <span class="detail-icon">📍</span>
                            <div><strong>Location</strong><p>${event.location}</p></div>
                        </div>
                        <div class="detail-item">
                            <span class="detail-icon">💵</span>
                            <div><strong>Price</strong><p>₹${parseFloat(event.ticketPrice).toFixed(2)}</p></div>
                        </div>
                        <div class="detail-item">
                            <span class="detail-icon">🎫</span>
                            <div><strong>Available</strong><p>${event.availableTickets} / ${event.totalTickets}</p></div>
                        </div>
                    </div>
                    <div class="modal-actions">
                        ${isAvailable
                            ? isLoggedIn
                                ? `<button class="btn btn-primary btn-full" onclick="bookEvent(${event.id})">Book Tickets</button>`
                                : `<button class="btn btn-primary btn-full" onclick="window.location.href='/login.html'">Login to Book</button>`
                            : `<button class="btn btn-disabled btn-full" disabled>Not Available</button>`
                        }
                    </div>
                </div>`;

            document.getElementById('event-modal').classList.remove('hidden');
        }

        function bookEvent(eventId) {
            closeModal();
            window.location.href = `/book-ticket.html?eventId=${eventId}`;
        }

        function closeModal() {
            document.getElementById('event-modal').classList.add('hidden');
        }

        function searchEvents() {
            const keyword = document.getElementById('search-input').value.trim();
            if (!keyword) {
                renderEvents(allEvents);
                return;
            }
            const filtered = allEvents.filter(e =>
                e.title.toLowerCase().includes(keyword.toLowerCase()) ||
                (e.category && e.category.toLowerCase().includes(keyword.toLowerCase())) ||
                (e.location && e.location.toLowerCase().includes(keyword.toLowerCase()))
            );
            renderEvents(filtered);
        }

        function filterEvents() {
            const status = document.getElementById('status-filter').value;
            if (!status) {
                renderEvents(allEvents);
            } else {
                renderEvents(allEvents.filter(e => e.status === status));
            }
        }

        document.getElementById('search-input').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') searchEvents();
        });

        function getCategoryIcon(cat) {
            const icons = {
                'Technology': '💻', 'Music': '🎵', 'Business': '💼',
                'Art': '🎨', 'Entertainment': '🎭', 'Sports': '⚽',
                'Food': '🍽️', 'Health': '🏥'
            };
            return icons[cat] || '🎪';
        }

        function getCategoryGradient(cat) {
            const gradients = {
                'Technology': 'linear-gradient(135deg, #667eea, #764ba2)',
                'Music': 'linear-gradient(135deg, #f093fb, #f5576c)',
                'Business': 'linear-gradient(135deg, #4facfe, #00f2fe)',
                'Art': 'linear-gradient(135deg, #43e97b, #38f9d7)',
                'Entertainment': 'linear-gradient(135deg, #fa709a, #fee140)',
                'Sports': 'linear-gradient(135deg, #30cfd0, #330867)',
            };
            return gradients[cat] || 'linear-gradient(135deg, #a18cd1, #fbc2eb)';
        }
    </script>
</body>
</html>
